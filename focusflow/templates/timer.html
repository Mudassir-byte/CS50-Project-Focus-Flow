{% extends "layout.html" %}

{% block main %}
<header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-start;">
    <div>
        <h1 class="gradient-text" style="font-size: 2.5rem;">Pomodoro Timer</h1>
        <p style="color: var(--text-secondary);">Focus and take regular breaks.</p>
    </div>
    <button id="settings-btn" class="btn" style="background: var(--glass-bg); color: var(--text-primary); border: 1px solid var(--glass-border);">⚙️ Settings</button>
</header>

<div class="timer-container glass" style="text-align: center; padding: 3rem; position: relative;">
    {% if task %}
    <div style="position: absolute; top: 1rem; left: 1rem; right: 1rem; color: var(--text-secondary);">
        <p style="margin: 0; font-size: 0.9rem;">Currently Focusing On:</p>
        <h3 style="color: var(--text-primary); margin-top: 0.25rem;">{{ task.title }}</h3>
        <input type="hidden" id="current-task-id" value="{{ task.id }}">
    </div>
    <div id="timer-title" style="font-size: 1.5rem; margin-bottom: 1rem; margin-top: 2rem;">Focus Session</div>
    {% else %}
    <div id="timer-title" style="font-size: 1.5rem; margin-bottom: 1rem;">Focus Session</div>
    {% endif %}
    
    <div id="timer-display" style="font-size: 4rem; margin: 2rem 0; color: var(--primary);">25:00</div>
    
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <button id="start-timer" class="btn">Start</button>
        <button id="pause-timer" class="btn" style="display: none;">Pause</button>
        <button id="reset-timer" class="btn" style="background: transparent; border: 1px solid var(--glass-border);">Reset</button>
    </div>
    <div id="session-info" style="margin-top: 2rem; color: var(--text-secondary);">
        <p>Current Session: <span id="current-session">Focus</span></p>
        <p>Sessions Completed: <span id="sessions-completed">0</span></p>
    </div>
</div>

<audio id="ambient-audio" loop>
    <source src="{{ url_for('static', filename='audio/lofi.mp3') }}" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- Timer Settings Modal -->
<div id="settings-modal" class="modal-overlay">
    <div class="modal-content glass">
        <div class="modal-header">
            <h3>Timer Settings</h3>
            <button class="modal-close" id="close-settings-modal">&times;</button>
        </div>
        <div class="form-group">
            <label for="focus-duration">Focus Duration (minutes)</label>
            <input type="number" id="focus-duration" class="form-control" value="25" min="1" max="60" style="margin-top: 0.5rem;">
        </div>
        <div class="form-group">
            <label for="break-duration">Break Duration (minutes)</label>
            <input type="number" id="break-duration" class="form-control" value="5" min="1" max="30" style="margin-top: 0.5rem;">
        </div>
        <button id="save-settings-btn" class="btn" style="width: 100%">Save Settings</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let timerInterval;
    // Load settings from localStorage
    let focusMinutes = parseInt(localStorage.getItem('focusDuration')) || 25;
    let breakMinutes = parseInt(localStorage.getItem('breakDuration')) || 5;
    
    let timeLeft = focusMinutes * 60;
    let isRunning = false;
    let isFocus = true;
    let sessionsCompleted = 0;

    const timerDisplay = document.getElementById('timer-display');
    const timerTitle = document.getElementById('timer-title');
    const startBtn = document.getElementById('start-timer');
    const pauseBtn = document.getElementById('pause-timer');
    const resetBtn = document.getElementById('reset-timer');
    const currentSession = document.getElementById('current-session');
    const sessionsCompletedEl = document.getElementById('sessions-completed');
    const audio = document.getElementById('ambient-audio');
    const taskIdInput = document.getElementById('current-task-id');
    
    // Settings elements
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettingsBtn = document.getElementById('close-settings-modal');
    const saveSettingsBtn = document.getElementById('save-settings-btn');
    const focusDurationInput = document.getElementById('focus-duration');
    const breakDurationInput = document.getElementById('break-duration');

    // Initialize inputs
    focusDurationInput.value = focusMinutes;
    breakDurationInput.value = breakMinutes;
    updateDisplay();

    // Settings logic
    settingsBtn.addEventListener('click', () => {
        settingsModal.style.display = 'flex';
    });

    closeSettingsBtn.addEventListener('click', () => {
        settingsModal.style.display = 'none';
    });

    saveSettingsBtn.addEventListener('click', () => {
        focusMinutes = parseInt(focusDurationInput.value);
        breakMinutes = parseInt(breakDurationInput.value);
        localStorage.setItem('focusDuration', focusMinutes);
        localStorage.setItem('breakDuration', breakMinutes);
        
        settingsModal.style.display = 'none';
        
        // Reset timer if not running to apply new settings
        if (!isRunning) {
            resetTimer();
        }
        
        // Use global showToast if available (from app.js)
        if (typeof showToast === 'function') {
            showToast('Settings saved!');
        }
    });

    startBtn.addEventListener('click', () => {
        if (!isRunning) {
            startTimer();
        }
    });

    pauseBtn.addEventListener('click', () => {
        pauseTimer();
    });

    resetBtn.addEventListener('click', () => {
        resetTimer();
    });

    function startTimer() {
        isRunning = true;
        startBtn.style.display = 'none';
        pauseBtn.style.display = 'inline-block';

        document.body.classList.add(isFocus ? 'focus-mode' : 'break-mode');
        timerTitle.textContent = isFocus ? 'Focus Session' : 'Break Time';
        currentSession.textContent = isFocus ? 'Focus' : 'Break';

        if (isFocus) {
            // Unmute/play only if supported, ignore play() errors if user hasn't interacted
            audio.play().catch(e => console.log('Audio play blocked: ', e));
        }

        timerInterval = setInterval(() => {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                handleTimerComplete();
            }
        }, 1000);
    }

    function handleTimerComplete() {
        clearInterval(timerInterval);
        isRunning = false;

        if (isFocus) {
            sessionsCompleted++;
            sessionsCompletedEl.textContent = sessionsCompleted;
            
            // If linked to a task, increment pomodoro count
            if (taskIdInput && taskIdInput.value) {
                fetch('/increment_pomodoro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `id=${taskIdInput.value}`
                }).then(response => response.json())
                  .then(data => {
                      if(data.success && typeof showToast === 'function') {
                          showToast('Pomodoro logged for this task!');
                      }
                  });
            }
            
            // Notification
            if (window.Notification && Notification.permission === "granted") {
                new Notification("Focus session complete!", { body: "Time to take a break." });
            } else if (typeof showToast === 'function') {
                showToast('Focus session complete! Take a break.', 'success');
            } else {
                alert('Focus session complete! Take a break.');
            }
        } else {
            if (window.Notification && Notification.permission === "granted") {
                new Notification("Break is over!", { body: "Time to focus." });
            } else if (typeof showToast === 'function') {
                showToast('Break time over! Back to work.', 'success');
            } else {
                alert('Break time over! Back to work.');
            }
        }

        isFocus = !isFocus;
        timeLeft = isFocus ? focusMinutes * 60 : breakMinutes * 60;
        updateDisplay();
        startBtn.style.display = 'inline-block';
        pauseBtn.style.display = 'none';
        document.body.classList.remove('focus-mode', 'break-mode');
        audio.pause();
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        startBtn.style.display = 'inline-block';
        pauseBtn.style.display = 'none';
        audio.pause();
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        isFocus = true;
        timeLeft = focusMinutes * 60;
        updateDisplay();
        startBtn.style.display = 'inline-block';
        pauseBtn.style.display = 'none';
        document.body.classList.remove('focus-mode', 'break-mode');
        audio.pause();
        timerTitle.textContent = 'Focus Session';
        currentSession.textContent = 'Focus';
    }

    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        document.title = `${timerDisplay.textContent} - FocusFlow`;
    }

    // Request notification permission
    if (window.Notification && Notification.permission !== "granted") {
        Notification.requestPermission();
    }
});
</script>
{% endblock %}
