<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Productivity Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass animate-fade">
            <div class="logo">
                <h2 class="gradient-text">FOCUSFLOW</h2>
            </div>
            <nav>
                <a href="/" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">Kanban Board</a>
                <a href="/timer" class="nav-item {% if request.endpoint == 'timer' %}active{% endif %}">Pomodoro Timer</a>
                <a href="/analytics" class="nav-item {% if request.endpoint == 'analytics' %}active{% endif %}">Analytics</a>
            </nav>
            <div style="margin-top: auto;">
                <a href="/logout" class="nav-item">Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content animate-fade" style="animation-delay: 0.1s;">
            {% block main %}{% endblock %}
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
