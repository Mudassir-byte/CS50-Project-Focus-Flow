{% extends "layout.html" %}

{% block main %}
<header style="margin-bottom: 2rem;">
    <h1 class="gradient-text" style="font-size: 2.5rem;">Analytics Dashboard</h1>
    <p style="color: var(--text-secondary);">Track your productivity and task completion.</p>
</header>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
    <!-- Task Distribution Chart -->
    <div class="glass" style="padding: 1.5rem;">
        <h3 style="margin-bottom: 1rem;">Task Distribution</h3>
        <div style="height: 300px; display: flex; justify-content: center;">
            <canvas id="taskChart"></canvas>
        </div>
    </div>

    <!-- Productivity Stats -->
    <div class="glass" style="padding: 1.5rem;">
        <h3 style="margin-bottom: 1rem;">Productivity Stats</h3>
        <div style="display: flex; flex-direction: column; gap: 1rem; font-size: 1.1rem;">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                <span>Total Tasks:</span> <strong id="total-tasks">0</strong>
            </div>
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                <span>Completed Tasks:</span> <strong id="completed-tasks" style="color: #48cfad;">0</strong>
            </div>
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                <span>In Progress:</span> <strong id="in-progress-tasks" style="color: #f6ad55;">0</strong>
            </div>
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                <span>To Do:</span> <strong id="todo-tasks" style="color: #667eea;">0</strong>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 1rem; font-size: 1.3rem;">
                <span>Completion Rate:</span> <strong id="completion-rate" class="gradient-text">0%</strong>
            </div>
        </div>
    </div>
</div>

<!-- Trend Line Chart -->
<div class="glass" style="padding: 1.5rem; margin-bottom: 2rem;">
    <h3 style="margin-bottom: 1rem;">Tasks Completed Over Time</h3>
    <div style="height: 300px; width: 100%;">
        <canvas id="trendChart"></canvas>
    </div>
</div>

<!-- Data container for JavaScript -->
<div id="analytics-data" 
     data-labels="{{ labels }}" 
     data-counts="{{ data }}" 
     data-trend-labels="{{ trend_labels }}" 
     data-trend-data="{{ trend_data }}" 
     style="display: none;"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    Chart.defaults.color = '#b8c5d1';
    Chart.defaults.font.family = "'Inter', sans-serif";

    // Read data from DOM
    const dataEl = document.getElementById('analytics-data');
    const labels = JSON.parse(dataEl.dataset.labels);
    const data = JSON.parse(dataEl.dataset.counts);

    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                label: 'Tasks',
                data: data,
                backgroundColor: [
                    'rgba(102, 126, 234, 0.8)', // Todo
                    'rgba(246, 173, 85, 0.8)',  // Doing
                    'rgba(72, 207, 173, 0.8)'   // Done
                ],
                borderColor: [
                    'rgba(102, 126, 234, 1)',
                    'rgba(246, 173, 85, 1)',
                    'rgba(72, 207, 173, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                }
            }
        }
    });

    // Trend Line Chart
    const trendCtx = document.getElementById('trendChart').getContext('2d');
    const trendLabels = JSON.parse(dataEl.dataset.trendLabels);
    const trendData = JSON.parse(dataEl.dataset.trendData);

    new Chart(trendCtx, {
        type: 'line',
        data: {
            labels: trendLabels,
            datasets: [{
                label: 'Completed Tasks',
                data: trendData,
                borderColor: '#f093fb',
                backgroundColor: 'rgba(240, 147, 251, 0.2)',
                borderWidth: 2,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    },
                    grid: {
                        color: 'rgba(255, 255, 255, 0.1)'
                    }
                },
                x: {
                    grid: {
                        color: 'rgba(255, 255, 255, 0.1)'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    // Calculate stats
    const totalTasks = data.reduce((a, b) => a + b, 0);
    const completedIndex = labels.indexOf('Done');
    const completedTasks = completedIndex !== -1 ? data[completedIndex] : 0;
    const inProgressIndex = labels.indexOf('Doing');
    const inProgressTasks = inProgressIndex !== -1 ? data[inProgressIndex] : 0;
    const todoIndex = labels.indexOf('Todo');
    const todoTasks = todoIndex !== -1 ? data[todoIndex] : 0;
    const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

    document.getElementById('total-tasks').textContent = totalTasks;
    document.getElementById('completed-tasks').textContent = completedTasks;
    document.getElementById('in-progress-tasks').textContent = inProgressTasks;
    document.getElementById('todo-tasks').textContent = todoTasks;
    document.getElementById('completion-rate').textContent = completionRate + '%';
});
</script>
{% endblock %}
